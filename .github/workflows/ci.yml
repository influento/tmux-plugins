name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tmux-warp/go.mod

      - name: Vet
        run: |
          cd tmux-warp
          go vet ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          cd tmux-warp
          go build -ldflags "-s -w" -o tmux-warp-${{ matrix.goos }}-${{ matrix.goarch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: tmux-warp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tmux-warp/tmux-warp-${{ matrix.goos }}-${{ matrix.goarch }}
